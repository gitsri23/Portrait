android {
    namespace "blur.bokeh.and"
    compileSdk 34

    defaultConfig {
        applicationId "blur.bokeh.and"
        minSdk 26 // Required for hardware level camera configurations
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    // MediaPipe Tasks Vision for real-time segmentation
    implementation 'com.google.mediapipe:tasks-vision:0.10.14'
    
    // Advanced Jetpack CameraX/Camera2 Core APIs
    def camerax_version = "1.3.1"
    implementation "androidx.camera:camera-core:${camerax_version}"
    implementation "androidx.camera:camera-camera2:${camerax_version}"
    implementation "androidx.camera:camera-lifecycle:${camerax_version}"
    implementation "androidx.camera:camera-view:${camerax_version}"
}
