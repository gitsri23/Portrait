name: Cinematic Camera Production Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 🚀 1. పాత ఫైల్స్ డిలీట్ చేసి కొత్త ఆండ్రాయిడ్ ప్రాజెక్ట్ క్రియేషన్
      - name: Recreate Android Project Core
        run: |
          rm -rf android
          flutter create . --project-name cinematic_camera --org com.example --platforms=android

      # 📦 2. MASTER PUBSPEC GENERATOR
      - name: Generate Clean Production Pubspec
        run: |
          rm -f pubspec.yaml
          cat << 'EOF' > pubspec.yaml
          name: cinematic_camera
          description: "Premium minimal cinematic portrait camera app."
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            google_fonts: ^6.1.0
            permission_handler: ^11.3.1

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0

          flutter:
            uses-material-design: true
          EOF

      # 🛠️ 3. కెమెరా మానిఫెస్ట్ ఇంజెక్షన్ (FIXED: ${applicationName} error)
      - name: Inject AndroidManifest.xml
        run: |
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.example.cinematic_camera">
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <application android:label="Portrait Camera" android:name="${applicationName}" android:icon="@mipmap/ic_launcher" android:requestLegacyExternalStorage="true">
                  <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop" android:theme="@style/LaunchTheme" android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode" android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2" />
              </application>
          </manifest>
          EOF

      # 🎥 4. CameraX డిపెండెన్సీలను build.gradle.kts కి యాడ్ చేయడం
      - name: Inject CameraX Dependencies
        run: |
          cat << 'EOF' >> android/app/build.gradle.kts
          
          dependencies {
              val cameraxVersion = "1.3.1"
              implementation("androidx.camera:camera-core:$cameraxVersion")
              implementation("androidx.camera:camera-camera2:$cameraxVersion")
              implementation("androidx.camera:camera-lifecycle:$cameraxVersion")
              implementation("androidx.camera:camera-view:$cameraxVersion")
          }
          EOF

      # 🧠 5. నేటివ్ Kotlin కెమెరా కోడ్ (MainActivity.kt) ఇంజెక్షన్ (FIXED: surfaceTexture() syntax)
      - name: Inject Custom Native Kotlin Code
        run: |
          mkdir -p android/app/src/main/kotlin/com/example/cinematic_camera
          cat << 'EOF' > android/app/src/main/kotlin/com/example/cinematic_camera/MainActivity.kt
          package com.example.cinematic_camera

          import android.graphics.SurfaceTexture
          import android.util.Size
          import android.view.Surface
          import androidx.annotation.NonNull
          import androidx.camera.core.CameraSelector
          import androidx.camera.core.Preview
          import androidx.camera.lifecycle.ProcessCameraProvider
          import androidx.core.content.ContextCompat
          import androidx.lifecycle.LifecycleOwner
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel
          import io.flutter.view.TextureRegistry
          import java.util.concurrent.ExecutorService
          import java.util.concurrent.Executors

          class MainActivity : FlutterActivity() {
              private val CHANNEL = "cinematic_camera/methods"
              private var textureEntry: TextureRegistry.SurfaceTextureEntry? = null
              private var cameraProvider: ProcessCameraProvider? = null
              private var lensFacing = CameraSelector.LENS_FACING_BACK
              private lateinit var cameraExecutor: ExecutorService

              override fun configureFlutterEngine(@NonNull flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  cameraExecutor = Executors.newSingleThreadExecutor()

                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                      when (call.method) {
                          "initCamera" -> {
                              textureEntry = flutterEngine.renderer.createSurfaceTexture()
                              startCamera(result)
                          }
                          "startRecording" -> result.success(null)
                          "stopRecording" -> result.success(null)
                          "setMode" -> result.success(null)
                          "switchCamera" -> {
                              lensFacing = if (CameraSelector.LENS_FACING_FRONT == lensFacing) CameraSelector.LENS_FACING_BACK else CameraSelector.LENS_FACING_FRONT
                              startCamera(null) 
                              result.success(null)
                          }
                          else -> result.notImplemented()
                      }
                  }
              }

              private fun startCamera(result: MethodChannel.Result?) {
                  val cameraProviderFuture = ProcessCameraProvider.getInstance(this)
                  cameraProviderFuture.addListener({
                      cameraProvider = cameraProviderFuture.get()
                      val preview = Preview.Builder().setTargetResolution(Size(1080, 1920)).build()

                      textureEntry?.surfaceTexture()?.apply {
                          setDefaultBufferSize(1080, 1920)
                          val surface = Surface(this)
                          preview.setSurfaceProvider { request ->
                              request.provideSurface(surface, cameraExecutor) {}
                          }
                      }

                      val cameraSelector = CameraSelector.Builder().requireLensFacing(lensFacing).build()

                      try {
                          cameraProvider?.unbindAll()
                          cameraProvider?.bindToLifecycle(this as LifecycleOwner, cameraSelector, preview)
                          result?.success(textureEntry?.id())
                      } catch (exc: Exception) {
                          result?.error("CAMERA_ERROR", "Hardware bind failed", exc.localizedMessage)
                      }
                  }, ContextCompat.getMainExecutor(this))
              }

              override fun onDestroy() {
                  super.onDestroy()
                  cameraExecutor.shutdown()
              }
          }
          EOF

      - name: Fetch and Verify Assets
        run: flutter pub get

      # 🚀 6. ప్రొడక్షన్ రిలీజ్ APK కంపైలేషన్
      - name: Compile Obfuscated Release APK
        run: flutter build apk --release --obfuscate --split-debug-info=build/app/outputs/symbols --no-tree-shake-icons

      # 📦 7. GitHub Releases లోకి అప్‌లోడ్
      - name: Create Production GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: Portrait Camera Release v1.0.0
          draft: false
          prerelease: false
          files: |
            build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
