name: Portrait Blur Production Build

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      # ✅ Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ✅ Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      # ✅ Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ✅ Recreate Android
      - name: Recreate Android Project
        run: |
          rm -rf android
          flutter create . --project-name portrait_blur --org com.example --platforms=android

      # ✅ Android Manifest
      - name: Inject AndroidManifest
        run: |
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.portrait_blur">

              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"
                  android:maxSdkVersion="29"/>

              <application
                  android:label="Portrait Blur"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:requestLegacyExternalStorage="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">

                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>

                  </activity>

                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />

              </application>

          </manifest>
          EOF

      # ✅ MainActivity
      - name: Inject MainActivity
        run: |
          mkdir -p android/app/src/main/kotlin/com/example/portrait_blur

          cat << 'EOF' > android/app/src/main/kotlin/com/example/portrait_blur/MainActivity.kt
          package com.example.portrait_blur

          import io.flutter.embedding.android.FlutterActivity

          class MainActivity: FlutterActivity() {
          }
          EOF

      # ✅ SDK FIX
      - name: Fix Android SDK Versions
        run: |
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/g' android/app/build.gradle.kts
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 36/g' android/app/build.gradle.kts

      # ✅ Clean
      - name: Flutter Clean
        run: flutter clean

      # ✅ Dependencies
      - name: Fetch Dependencies
        run: flutter pub get

      # ✅ Build APK
      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      # ✅ Upload APK
      - name: Upload Release APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: Portrait Blur Release v1.0.0
          draft: false
          prerelease: false
          files: |
            build/app/outputs/flutter-apk/app-release.apk

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
