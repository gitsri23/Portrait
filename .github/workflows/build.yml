name: Android Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # RECREATE CLEAN ANDROID FOLDER
      - name: Recreate Android Folder
        run: |
          rm -rf android
          flutter create . --project-name portrait_blur --org com.example --platforms=android

      # FORCE SDK 36 EVERYWHERE
      - name: Force Android SDK 36
        run: |
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/g' android/app/build.gradle.kts
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 36/g' android/app/build.gradle.kts

          find . -name "build.gradle.kts" -exec sed -i 's/compileSdk = 34/compileSdk = 36/g' {} +
          find . -name "build.gradle.kts" -exec sed -i 's/targetSdk = 34/targetSdk = 36/g' {} +

          find . -name "build.gradle" -exec sed -i 's/compileSdkVersion 34/compileSdkVersion 36/g' {} +
          find . -name "build.gradle" -exec sed -i 's/targetSdkVersion 34/targetSdkVersion 36/g' {} +

      # UPDATE MANIFEST
      - name: Update AndroidManifest
        run: |
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.portrait_blur">

              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"
                  android:maxSdkVersion="29"/>

              <application
                  android:label="Portrait Blur"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:requestLegacyExternalStorage="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">

                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>

                  </activity>

                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />

              </application>

          </manifest>
          EOF

      # FIX MAIN ACTIVITY
      - name: Create MainActivity
        run: |
          mkdir -p android/app/src/main/kotlin/com/example/portrait_blur

          cat << 'EOF' > android/app/src/main/kotlin/com/example/portrait_blur/MainActivity.kt
          package com.example.portrait_blur

          import io.flutter.embedding.android.FlutterActivity

          class MainActivity: FlutterActivity() {
          }
          EOF

      # ACCEPT LICENSES
      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      # CLEAN
      - name: Flutter Clean
        run: flutter clean

      # GET PACKAGES
      - name: Flutter Pub Get
        run: flutter pub get

      # BUILD APK
      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      # UPLOAD APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: portrait-blur-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # GITHUB RELEASE
      - name: Release APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.${{ github.run_number }}
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
