name: Bokeh App Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0
          channel: stable

      # ─── 📸 NATIVE ANDROID PROJECT GENERATION ───
      - name: Recreate Android Project Wrapper
        run: |
          rm -rf android
          flutter create . \
            --project-name and \
            --org blur.bokeh \
            --platforms=android
          rm -rf test

      # ─── 🧠 INJECT NATIVE KOTLIN & RECORDING FEED ───
      - name: Inject Native Camera and Render Scripts
        run: |
          mkdir -p android/app/src/main/kotlin/blur/bokeh/and/
          
          # Inject MainActivity.kt with Real Camera2 API Feed, Recording & Gallery Save
          cat << 'EOF' > android/app/src/main/kotlin/blur/bokeh/and/MainActivity.kt
          package blur.bokeh.and

          import android.Manifest
          import android.content.ContentValues
          import android.content.pm.PackageManager
          import android.hardware.camera2.*
          import android.media.MediaRecorder
          import android.os.Environment
          import android.provider.MediaStore
          import android.view.Surface
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel
          import io.flutter.view.TextureRegistry
          import java.io.File

          class MainActivity: FlutterActivity() {
              private val CHANNEL = "blur.bokeh.and/camera"
              private var textureEntry: TextureRegistry.SurfaceTextureEntry? = null
              private var flutterResult: MethodChannel.Result? = null
              private var myFlutterEngine: FlutterEngine? = null
              
              private var cameraDevice: CameraDevice? = null
              private var mediaRecorder: MediaRecorder? = null
              private var videoFile: File? = null
              private var isRecording = false

              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  myFlutterEngine = flutterEngine

                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                      when (call.method) {
                          "initializeCamera" -> {
                              flutterResult = result
                              if (checkSelfPermission(Manifest.permission.CAMERA) != PackageManager.PERMISSION_GRANTED ||
                                  checkSelfPermission(Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                                  requestPermissions(arrayOf(Manifest.permission.CAMERA, Manifest.permission.RECORD_AUDIO, Manifest.permission.WRITE_EXTERNAL_STORAGE), 101)
                              } else {
                                  startPhysicalCamera()
                              }
                          }
                          "toggleRecord" -> {
                              val start = call.argument<Boolean>("start") ?: false
                              if (start) startRecording() else stopRecording()
                              result.success(null)
                          }
                          "updateDepth" -> result.success(null)
                          "updateColor" -> result.success(null)
                          else -> result.notImplemented()
                      }
                  }
              }

              override fun onRequestPermissionsResult(requestCode: Int, permissions: Array<out String>, grantResults: IntArray) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults)
                  if (requestCode == 101 && grantResults.isNotEmpty() && grantResults[0] == PackageManager.PERMISSION_GRANTED) {
                      startPhysicalCamera()
                  }
              }

              private fun startPhysicalCamera() {
                  try {
                      textureEntry = myFlutterEngine?.renderer?.createSurfaceTexture()
                      val surfaceTexture = textureEntry?.surfaceTexture()
                      surfaceTexture?.setDefaultBufferSize(1080, 1920)
                      val previewSurface = Surface(surfaceTexture)

                      val manager = getSystemService(CAMERA_SERVICE) as CameraManager
                      val cameraId = manager.cameraIdList.firstOrNull {
                          manager.getCameraCharacteristics(it).get(CameraCharacteristics.LENS_FACING) == CameraCharacteristics.LENS_FACING_BACK
                      } ?: manager.cameraIdList[0]

                      manager.openCamera(cameraId, object : CameraDevice.StateCallback() {
                          override fun onOpened(camera: CameraDevice) {
                              cameraDevice = camera
                              val requestBuilder = camera.createCaptureRequest(CameraDevice.TEMPLATE_PREVIEW)
                              requestBuilder.addTarget(previewSurface)
                              
                              camera.createCaptureSession(listOf(previewSurface), object : CameraCaptureSession.StateCallback() {
                                  override fun onConfigured(session: CameraCaptureSession) {
                                      session.setRepeatingRequest(requestBuilder.build(), null, null)
                                      flutterResult?.success(textureEntry?.id())
                                  }
                                  override fun onConfigureFailed(session: CameraCaptureSession) {}
                              }, null)
                          }
                          override fun onDisconnected(camera: CameraDevice) { camera.close() }
                          override fun onError(camera: CameraDevice, error: Int) { camera.close() }
                      }, null)
                  } catch (e: Exception) {
                      flutterResult?.error("CAMERA_ERROR", e.message, null)
                  }
              }

              private fun startRecording() {
                  if (cameraDevice == null) return
                  val videoDir = getExternalFilesDir(Environment.DIRECTORY_MOVIES)
                  videoFile = File(videoDir, "Bokeh_${System.currentTimeMillis()}.mp4")

                  mediaRecorder = MediaRecorder().apply {
                      setAudioSource(MediaRecorder.AudioSource.MIC)
                      setVideoSource(MediaRecorder.VideoSource.SURFACE)
                      setOutputFormat(MediaRecorder.OutputFormat.MPEG_4)
                      setOutputFile(videoFile!!.absolutePath)
                      setVideoEncoder(MediaRecorder.VideoEncoder.H264)
                      setAudioEncoder(MediaRecorder.AudioEncoder.AAC)
                      setVideoSize(1080, 1920)
                      setVideoFrameRate(30)
                      setVideoEncodingBitRate(10000000)
                      prepare()
                      start()
                  }
                  isRecording = true
              }

              private fun stopRecording() {
                  if (!isRecording) return
                  mediaRecorder?.apply {
                      stop()
                      reset()
                      release()
                  }
                  mediaRecorder = null
                  isRecording = false

                  // Save to Public Gallery
                  videoFile?.let { file ->
                      val values = ContentValues().apply {
                          put(MediaStore.Video.Media.DISPLAY_NAME, file.name)
                          put(MediaStore.Video.Media.MIME_TYPE, "video/mp4")
                          put(MediaStore.Video.Media.RELATIVE_PATH, Environment.DIRECTORY_DCIM + "/BokehCamera")
                      }
                      contentResolver.insert(MediaStore.Video.Media.EXTERNAL_CONTENT_URI, values)?.let { uri ->
                          contentResolver.openOutputStream(uri)?.use { outStream ->
                              file.inputStream().use { inStream -> inStream.copyTo(outStream) }
                          }
                      }
                  }
              }
          }
          EOF

      # ─── 🤖 MEDIAPIPE MODEL INJECTION ───
      - name: Download MediaPipe Model Directly to Native Assets
        run: |
          mkdir -p android/app/src/main/assets
          wget -qO android/app/src/main/assets/selfie_segmenter.tflite https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite

      # ─── ⚙️ GRADLE, KOTLIN & ARCHITECTURE FIXES ───
      - name: Fix Android Build Configs & Package Registry
        run: |
          sed -i 's/id "org.jetbrains.kotlin.android" version .*/id "org.jetbrains.kotlin.android" version "1.9.24" apply false/g' android/settings.gradle
          sed -i 's/id "com.android.application" version .*/id "com.android.application" version "8.5.0" apply false/g' android/settings.gradle
          sed -i 's/gradle-[0-9\.]*-all\.zip/gradle-8.7-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties
          
          # Target SDK 34 Updates
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 34/g' android/app/build.gradle
          sed -i 's/compileSdk flutter.compileSdkVersion/compileSdk 34/g' android/app/build.gradle
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 34/g' android/app/build.gradle
          sed -i 's/targetSdk flutter.targetSdkVersion/targetSdk 34/g' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 26/g' android/app/build.gradle
          
          # NDK Fix
          sed -i '/defaultConfig {/i \    ndkVersion = "26.1.10909125"' android/app/build.gradle
          
          # Fix the label without breaking the package name
          sed -i 's/android:label="and"/android:label="Bokeh Camera"/g' android/app/src/main/AndroidManifest.xml

      # ─── 🛠️ PAGE SIZE FIX & PACKAGING OPTIONS ───
      - name: Inject 16KB Alignment & Prevent Artifacts
        run: |
          sed -i '/defaultConfig {/a \        externalNativeBuild {\
              ndkBuild {\
                  arguments "LOCAL_LDFLAGS+=-Wl,-z,max-page-size=16384"\
              }\
          }' android/app/build.gradle

          sed -i '/android {/a \    packagingOptions {\
              resources {\
                  excludes += "/META-INF/{AL2.0,LGPL2.1}"\
                  excludes += "META-INF/native-image/**/*"\
                  excludes += "META-INF/compiler_resources.properties"\
              }\
          }' android/app/build.gradle

      # ─── 🎥 MEDIAPIPE & CAMERA HARDWARE PERMISSIONS ───
      - name: Inject Hardware Permissions & MediaPipe Dependencies
        run: |
          sed -i '/<manifest/a \
              <uses-permission android:name="android.permission.CAMERA"/>\
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>\
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>\
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>' \
              android/app/src/main/AndroidManifest.xml

          sed -i '/dependencies {/a \    implementation "com.google.mediapipe:tasks-vision:0.10.14"\
              def camerax_version = "1.3.1"\
              implementation "androidx.camera:camera-core:${camerax_version}"\
              implementation "androidx.camera:camera-camera2:${camerax_version}"\
              implementation "androidx.camera:camera-lifecycle:${camerax_version}"\
              implementation "androidx.camera:camera-view:${camerax_version}"' \
              android/app/build.gradle

      - name: Fetch Flutter Dependencies
        run: flutter pub get

      # ─── 🛠️ CODE SYNTAX FAILSAFES ───
      - name: Patch Dart Code Syntax Layout Errors
        run: |
          sed -i 's/Colors.black95/Colors.black87/g' lib/main.dart || true

      # ─── 🚀 COMPILATION & RELEASES ───
      - name: Compile Release APK
        run: flutter build apk --release

      - name: Push Build Artifact to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Bokeh Cinematic Recorder v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
