name: Bokeh App Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0
          channel: stable

      # ─── 📸 NATIVE ANDROID PROJECT GENERATION ───
      - name: Recreate Android Project Wrapper
        run: |
          rm -rf android
          flutter create . \
            --project-name and \
            --org blur.bokeh \
            --platforms=android
          rm -rf test

      # ─── 🧠 INJECT NATIVE KOTLIN & RENDERER CODE ───
      - name: Inject Native Camera and Render Scripts
        run: |
          mkdir -p android/app/src/main/kotlin/blur/bokeh/and/
          
          # 1. Create CinematicGLRenderer.kt
          cat << 'EOF' > android/app/src/main/kotlin/blur/bokeh/and/CinematicGLRenderer.kt
          package blur.bokeh.and

          class CinematicGLRenderer {
              private var blurIntensity: Float = 0.5f
              private var colorBalance: Float = 1.0f

              fun setBlur(value: Float) { blurIntensity = value }
              fun setColor(value: Float) { colorBalance = value }
              
              // Core OpenGL setup and rendering hooks will go here
              fun render() {
                  // Pipeline execution
              }
          }
          EOF

          # 2. Create MainActivity.kt with Method Channels
          cat << 'EOF' > android/app/src/main/kotlin/blur/bokeh/and/MainActivity.kt
          package blur.bokeh.and

          import android.graphics.SurfaceTexture
          import android.os.Bundle
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel
          import io.flutter.view.TextureRegistry

          class MainActivity: FlutterActivity() {
              private val CHANNEL = "blur.bokeh.and/camera"
              private var textureEntry: TextureRegistry.SurfaceTextureEntry? = null
              private val renderer = CinematicGLRenderer()

              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)

                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                      when (call.method) {
                          "initializeCamera" -> {
                              // Registering the native texture with Flutter UI
                              textureEntry = flutterEngine.renderer.createSurfaceTexture()
                              val surfaceTexture = textureEntry?.surfaceTexture()
                              val textureId = textureEntry?.id()

                              if (surfaceTexture != null && textureId != null) {
                                  // Standard 1080p camera buffer setup
                                  surfaceTexture.setDefaultBufferSize(1080, 1920)
                                  
                                  // Send texture ID back to Flutter to remove loading screen
                                  result.success(textureId)
                              } else {
                                  result.error("UNAVAILABLE", "Failed to get texture", null)
                              }
                          }
                          "updateDepth" -> {
                              val intensity = call.argument<Double>("intensity")?.toFloat() ?: 0.5f
                              renderer.setBlur(intensity)
                              result.success(null)
                          }
                          "updateColor" -> {
                              val balance = call.argument<Double>("balance")?.toFloat() ?: 1.0f
                              renderer.setColor(balance)
                              result.success(null)
                          }
                          "toggleRecord" -> {
                              // Record logic
                              result.success(null)
                          }
                          else -> result.notImplemented()
                      }
                  }
              }
          }
          EOF

      # ─── 🤖 MEDIAPIPE MODEL INJECTION ───
      - name: Download MediaPipe Model Directly to Native Assets
        run: |
          mkdir -p android/app/src/main/assets
          wget -qO android/app/src/main/assets/selfie_segmenter.tflite https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite

      # ─── ⚙️ GRADLE, KOTLIN & ARCHITECTURE FIXES ───
      - name: Fix Android Build Configs & Package Registry
        run: |
          sed -i 's/id "org.jetbrains.kotlin.android" version .*/id "org.jetbrains.kotlin.android" version "1.9.24" apply false/g' android/settings.gradle
          sed -i 's/id "com.android.application" version .*/id "com.android.application" version "8.5.0" apply false/g' android/settings.gradle
          sed -i 's/gradle-[0-9\.]*-all\.zip/gradle-8.7-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties
          
          # Target SDK 34 Updates
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 34/g' android/app/build.gradle
          sed -i 's/compileSdk flutter.compileSdkVersion/compileSdk 34/g' android/app/build.gradle
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 34/g' android/app/build.gradle
          sed -i 's/targetSdk flutter.targetSdkVersion/targetSdk 34/g' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 26/g' android/app/build.gradle
          
          # NDK Fix
          sed -i '/defaultConfig {/i \    ndkVersion = "26.1.10909125"' android/app/build.gradle
          
          # App name label
          sed -i 's/android:label="and"/android:label="Bokeh Camera"/g' android/app/src/main/AndroidManifest.xml

      # ─── 🛠️ PAGE SIZE FIX & PACKAGING OPTIONS ───
      - name: Inject 16KB Alignment & Prevent Artifacts
        run: |
          sed -i '/defaultConfig {/a \        externalNativeBuild {\
              ndkBuild {\
                  arguments "LOCAL_LDFLAGS+=-Wl,-z,max-page-size=16384"\
              }\
          }' android/app/build.gradle

          sed -i '/android {/a \    packagingOptions {\
              resources {\
                  excludes += "/META-INF/{AL2.0,LGPL2.1}"\
                  excludes += "META-INF/native-image/**/*"\
                  excludes += "META-INF/compiler_resources.properties"\
              }\
          }' android/app/build.gradle

      # ─── 🎥 MEDIAPIPE & CAMERA HARDWARE PERMISSIONS ───
      - name: Inject Hardware Permissions & MediaPipe Dependencies
        run: |
          sed -i '/<manifest/a \
              <uses-permission android:name="android.permission.CAMERA"/>\
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>\
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>\
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>' \
              android/app/src/main/AndroidManifest.xml

          sed -i '/dependencies {/a \    implementation "com.google.mediapipe:tasks-vision:0.10.14"\
              def camerax_version = "1.3.1"\
              implementation "androidx.camera:camera-core:${camerax_version}"\
              implementation "androidx.camera:camera-camera2:${camerax_version}"\
              implementation "androidx.camera:camera-lifecycle:${camerax_version}"\
              implementation "androidx.camera:camera-view:${camerax_version}"' \
              android/app/build.gradle

      - name: Fetch Flutter Dependencies
        run: flutter pub get

      # ─── 🛠️ CODE SYNTAX FAILSAFES ───
      - name: Patch Dart Code Syntax Layout Errors
        run: |
          sed -i 's/Colors.black95/Colors.black87/g' lib/main.dart || true

      # ─── 🚀 COMPILATION & RELEASES ───
      - name: Compile Release APK
        run: flutter build apk --release

      - name: Push Build Artifact to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Bokeh Cinematic Recorder v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
