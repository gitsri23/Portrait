name: bokeh
description: Advanced Cinematic Portrait Video Recorder with MediaPipe and OpenGL
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  # Ensure your MediaPipe selfie segmenter model asset is declared here
  assets:
    - assets/selfie_segmenter.tflite
