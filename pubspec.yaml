name: portrait_blur_camera
description: AI Portrait Video Blur Camera
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Camera
  camera: ^0.11.0+1

  # State Management
  flutter_riverpod: ^2.5.1

  # Permissions
  permission_handler: ^11.3.1

  # File Paths
  path_provider: ^2.1.3
  path: ^1.9.0

  # Video Player
  video_player: ^2.8.6

  # FFmpeg
  ffmpeg_kit_flutter_min_gpl: ^6.0.3

  # MediaPipe / ML
  google_mlkit_selfie_segmentation: ^0.9.0

  # UI
  google_fonts: ^6.2.1

  # Animations
  animations: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
