name: portrait_blur

description: AI Portrait Blur Video App

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # File Picker
  file_picker: ^8.0.0

  # Video Player
  video_player: ^2.8.6

  # Paths
  path_provider: ^2.1.3
  path: ^1.9.0

  # Permissions
  permission_handler: ^11.3.1

  # FFmpeg
  ffmpeg_kit_flutter_new_video: ^2.0.0

  # AI Segmentation
  google_mlkit_selfie_segmentation: ^0.9.0

  # Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
