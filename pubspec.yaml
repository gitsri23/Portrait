name: nokia_cricket
description: Nokia Style Cricket Game
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Game Engine
  flame: ^1.19.0
  flame_audio: ^2.1.8

  # Audio
  audioplayers: ^6.0.0

  # Local Storage
  shared_preferences: ^2.3.2

  # Animations
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/fonts/

  fonts:
    - family: NokiaPixel
      fonts:
        - asset: assets/fonts/NokiaPixel.ttf
